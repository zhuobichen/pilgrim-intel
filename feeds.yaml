# Pilgrim Intel v2.2 — 零重叠 · 四角色日报
feeds:

  # ── 🎭 综合日报：国内社会文化 ────────────────────
  - id: abstract-culture
    name: 综合日报
    llm: {model: deepseek-chat, api_key_env: DEEPSEEK_API_KEY, api_base: "https://api.deepseek.com", temperature: 0.85, max_tokens: 8000}
    push: {email: true, email_to: "${EMAIL_TO}"}
    schedule: "daily 18:30"
    enabled: true
    prompt_template: |
      你是国内社会文化观察家。根据以下 {{COUNT}} 条中文互联网热点，撰写一份有深度的中文日报。只基于提供的内容进行分析，不要编造。

      🔥 今日焦点（至少 10 条：每条含核心事件+关键背景+各方反应，编号罗列）
      📊 趋势洞察（从今日热点提炼2-3个社会/文化趋势，分析驱动力和走向）
      🎭 互联网现象（社交媒体热议、亚文化现象、网友态度，轻松解读但不失洞察）
      🧠 AI 分析总结（100-150字：今日核心信号是什么？最值得关注的长期趋势是什么？）

      格式 Markdown，板块间用 --- 分隔。每板块至少 300 字。至少 10 条新闻。

      {{CONTEXT}}
    sources:
      - {id: weibo, name: 微博, type: hotlist, url: "https://weibo.com/ajax/side/hotSearch"}
      - {id: bilibili, name: B站, type: hotlist, url: "https://api.bilibili.com/x/web-interface/ranking/v2?rid=0"}
      - {id: zhihu, name: 知乎, type: hotlist, url: "https://www.zhihu.com/api/v3/feed/topstory/hot-lists/total?limit=20"}
      - {id: baidu, name: 百度, type: hotlist, url: "https://top.baidu.com/board?tab=realtime"}
      - {id: toutiao, name: 头条, type: hotlist, url: "https://www.toutiao.com/hot-event/hot-board/?origin=toutiao_pc"}
      - {id: 36kr, name: 36氪, type: hotlist, url: "https://36kr.com/api/newsflash"}
      - {id: ithome, name: IT之家, type: rss, url: "https://www.ithome.com/rss/"}

  # ── 🌍 新闻速报：国际政经 ────────────────────────
  - id: trendradar
    name: 新闻速报
    llm: {model: deepseek-chat, api_key_env: DEEPSEEK_API_KEY, api_base: "https://api.deepseek.com", temperature: 0.5, max_tokens: 6000}
    push: {email: true, email_to: "${EMAIL_TO}"}
    schedule: "daily 18:32"
    enabled: true
    prompt_template: |
      你是资深国际新闻编辑。根据以下 {{COUNT}} 条来自全球主流媒体的当日新闻，写一份严肃专业的国际新闻简报。只基于提供的内容，不要编造。

      📰 头条聚焦（至少 10 条深度解读：核心事实+影响分析+关键背景，编号罗列）
      🌐 全球速览（按亚太/欧洲/美洲/中东分区，各至少 2-3 条要闻，侧重国际关系与外交动向）
      💹 财经市场（重要经济数据、市场异动、企业重大动态，说明影响）
      🧠 AI 分析总结（100-150字：全球局势的核心信号？未来72小时最值得关注的风险/机会？）

      格式 Markdown，板块间用 --- 分隔。至少 10 条新闻。

      {{CONTEXT}}
    sources:
      - {id: npr, name: NPR, type: rss, url: "https://feeds.npr.org/1001/rss.xml"}
      - {id: cbs, name: CBS, type: rss, url: "https://www.cbsnews.com/latest/rss/main"}
      - {id: abcnews, name: ABC, type: rss, url: "https://abcnews.go.com/abcnews/topstories"}
      - {id: politico, name: Politico, type: rss, url: "https://rss.politico.com/politics-news.xml"}
      - {id: cnbc, name: CNBC, type: rss, url: "https://www.cnbc.com/id/19854910/device/rss/rss.html"}
      - {id: france24, name: France24, type: rss, url: "https://www.france24.com/en/rss"}
      - {id: wsjtech, name: WSJ, type: rss, url: "https://feeds.a.dj.com/rss/RSSWSJD.xml"}
      - {id: thehill, name: The Hill, type: rss, url: "https://thehill.com/rss/syndicator/19110"}
      - {id: vice, name: VICE, type: rss, url: "https://www.vice.com/en/rss"}
      - {id: cnet, name: CNET, type: rss, url: "https://www.cnet.com/rss/news/"}

  # ── 🎮 游戏日报：全球游戏 ────────────────────────
  - id: gamehub
    name: 游戏日报
    llm: {model: deepseek-chat, api_key_env: DEEPSEEK_API_KEY, api_base: "https://api.deepseek.com", temperature: 0.6, max_tokens: 6000}
    push: {email: true, email_to: "${EMAIL_TO}"}
    schedule: "daily 18:34"
    enabled: true
    prompt_template: |
      你是资深游戏编辑。根据以下 {{COUNT}} 条全球游戏资讯，写一份充实的日报。只基于提供的内容。

      🔥 重磅新闻（新作/收购/重大更新，含分析和影响，至少 3 条）
      🎮 新游动态（类型/平台/发售日/亮点/期待值分析，至少 5 条）
      📰 行业新闻（公司动态+市场数据+法规，引用数据，至少 5 条）
      🎙️ 评测观点（多方角度呈现，避免一面倒，至少 3 条）
      🧠 AI 分析总结（80-120字：今日游戏圈核心信号？什么趋势值得关注？）

      格式 Markdown。总计至少 10 条新闻。

      {{CONTEXT}}
    sources:
      - {id: yystv, name: 游研社, type: rss, url: "https://www.yystv.cn/rss/feed"}
      - {id: gcores, name: 机核, type: rss, url: "https://www.gcores.com/rss"}
      - {id: eurogamer, name: Eurogamer, type: rss, url: "https://www.eurogamer.net/feed"}
      - {id: pcgamer, name: PCGamer, type: rss, url: "https://www.pcgamer.com/rss/"}
      - {id: rockpapershotgun, name: RPS, type: rss, url: "https://www.rockpapershotgun.com/feed"}
      - {id: vg247, name: VG247, type: rss, url: "https://www.vg247.com/feed"}
      - {id: gamespot, name: GameSpot, type: rss, url: "https://www.gamespot.com/feeds/mashup/"}
      - {id: ign, name: IGN, type: rss, url: "https://feeds.feedburner.com/ign/all"}
      - {id: polygon, name: Polygon, type: rss, url: "https://www.polygon.com/rss/index.xml"}
      - {id: gematsu, name: Gematsu, type: rss, url: "https://www.gematsu.com/feed"}
      - {id: nintendolife, name: NLife, type: rss, url: "https://www.nintendolife.com/feeds/latest"}
      - {id: kotaku, name: Kotaku, type: rss, url: "https://kotaku.com/rss"}
      - {id: destructoid, name: Dtoid, type: rss, url: "https://www.destructoid.com/feed/"}
      - {id: rpgsite, name: RPGSite, type: rss, url: "https://www.rpgsite.net/feed"}
      - {id: siliconera, name: Siliconera, type: rss, url: "https://www.siliconera.com/feed/"}

  # ── 💻 科技日报：全球科技学术 ────────────────────
  - id: horizon
    name: 科技日报
    llm: {model: deepseek-chat, api_key_env: DEEPSEEK_API_KEY, api_base: "https://api.deepseek.com", temperature: 0.3, max_tokens: 8000}
    push: {email: true, email_to: "${EMAIL_TO}"}
    schedule: "daily 18:36"
    enabled: true
    prompt_template: |
      你是资深技术编辑。根据以下 {{COUNT}} 条全球科技新闻，撰写全面深入的中英双语技术日报。只基于提供的内容。

      🤖 AI/ML（模型发布+技术突破+行业应用+监管，至少 5 条，含中英双语摘要）
      💻 开源开发（重要库/框架/工具更新，至少 3 条，解释技术要点）
      🏢 科技产业（公司动态+融资+战略变化，至少 3 条，说明业务影响）
      🔬 学术前沿（重要论文/研究突破，至少 2 条，解释创新点+潜在应用）
      📡 产品硬件（新设备/新功能，至少 2 条）
      📊 趋势数据（行业报告+数据洞察，至少 2 条）
      🧠 AI 分析总结（120-180字：今日科技圈核心信号？最值得关注的长期趋势？对开发者的影响？）

      每条新闻含中英双语摘要（CN first, EN one-line）。板块间 --- 分隔。总计至少 10 条。

      {{CONTEXT}}
    sources:
      - {id: hackernews, name: HN, type: hotlist, url: "https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=20"}
      - {id: devto, name: DEV, type: hotlist, url: "https://dev.to/api/articles?per_page=20&top=1"}
      - {id: techcrunch, name: TechCrunch, type: rss, url: "https://techcrunch.com/feed/"}
      - {id: theverge, name: TheVerge, type: rss, url: "https://www.theverge.com/rss/index.xml"}
      - {id: arstechnica, name: Ars, type: rss, url: "https://feeds.arstechnica.com/arstechnica/index"}
      - {id: wired, name: WIRED, type: rss, url: "https://www.wired.com/feed/rss"}
      - {id: engadget, name: Engadget, type: rss, url: "https://www.engadget.com/rss.xml"}
      - {id: techreview, name: MIT, type: rss, url: "https://www.technologyreview.com/feed/"}
      - {id: sciencedaily, name: Science, type: rss, url: "https://www.sciencedaily.com/rss/all.xml"}
      - {id: nature, name: Nature, type: rss, url: "https://www.nature.com/nature.rss"}
      - {id: zdnet, name: ZDNet, type: rss, url: "https://www.zdnet.com/news/rss.xml"}
      - {id: mashable, name: Mashable, type: rss, url: "https://mashable.com/feed"}
      - {id: physorg, name: Phys.org, type: rss, url: "https://phys.org/rss-feed/"}
      - {id: spacecom, name: Space, type: rss, url: "https://www.space.com/feeds/all"}
      - {id: hackaday, name: Hackaday, type: rss, url: "https://hackaday.com/blog/feed/"}
      - {id: lobsters, name: Lobsters, type: rss, url: "https://lobste.rs/rss"}
      - {id: producthunt, name: PH, type: api, url: "https://api.producthunt.com/v1/posts?per_page=15"}
      - {id: githubtrending, name: GitHub, type: hotlist, url: "https://api.github.com/search/repositories?q=stars:%3E500+pushed:%3E2024-01-01&sort=stars&order=desc&per_page=15"}
