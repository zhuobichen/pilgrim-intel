      - {id: nature, name: Nature, type: rss, url: "https://www.nature.com/nature.rss"}
      - {id: zdnet, name: ZDNet, type: rss, url: "https://www.zdnet.com/news/rss.xml"}
      - {id: mashable, name: Mashable, type: rss, url: "https://mashable.com/feed"}
