      - {id: theverge, name: TheVerge, type: rss, url: "https://www.theverge.com/rss/index.xml"}
      - {id: wired, name: WIRED, type: rss, url: "https://www.wired.com/feed/rss"}
      - {id: npr, name: NPR, type: rss, url: "https://feeds.npr.org/1001/rss.xml"}
      - {id: france24, name: France24, type: rss, url: "https://www.france24.com/en/rss"}
      - {id: cbs, name: CBS, type: rss, url: "https://www.cbsnews.com/latest/rss/main"}
      - {id: cnbc, name: CNBC, type: rss, url: "https://www.cnbc.com/id/19854910/device/rss/rss.html"}
      - {id: politico, name: Politico, type: rss, url: "https://rss.politico.com/politics-news.xml"}

  # ── 游戏日报 ──────────────────────────────────────
  - id: gamehub
    name: 游戏日报
    llm: {model: deepseek-chat, api_key_env: DEEPSEEK_API_KEY, api_base: "https://api.deepseek.com", temperature: 0.6, max_tokens: 6000}
    push: {email: true, email_to: "${EMAIL_TO}"}
    schedule: "daily 18:34"
    enabled: true
    prompt_template: |
      你是资深游戏编辑。根据以下 {{COUNT}} 条全球游戏资讯，写一份充实的日报。

      🔥 重磅新闻（新作/收购/重大更新，含分析）
      🎮 新游动态（类型/平台/发售日/亮点/期待值分析）
      📰 行业新闻（公司动态+市场数据+法规，有数据就引用）
      🎙️ 评测观点（多方角度，避免一面倒）
      💡 开发社区（独立游戏/开源/MOD/社区大事）
      最后 50 字总结核心信号。

      {{CONTEXT}}
    sources:
      - {id: yystv, name: 游研社, type: rss, url: "https://www.yystv.cn/rss/feed"}
      - {id: gcores, name: 机核, type: rss, url: "https://www.gcores.com/rss"}
