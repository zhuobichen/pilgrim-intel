  # ── 科技日报 ──────────────────────────────────────
  - id: horizon
    name: 科技日报
    llm: {model: deepseek-chat, api_key_env: DEEPSEEK_API_KEY, api_base: "https://api.deepseek.com", temperature: 0.3, max_tokens: 8000}
    push: {email: true, email_to: "${EMAIL_TO}"}
    schedule: "daily 18:36"
    enabled: true
    prompt_template: |
      你是资深技术编辑。根据以下 {{COUNT}} 条科技新闻，撰写全面深入的中英双语技术日报。每个板块至少 250 字。

      🤖 AI/ML（模型发布+技术突破+行业应用+监管）
      💻 开源开发（重要库/框架/工具更新+技术解释）
      🏢 科技产业（公司动态+融资+战略）
      🔬 学术前沿（重要论文/研究+技术解释+潜在应用）
      📡 产品硬件（新设备/新服务/新功能）
      📊 趋势数据（行业报告+数据洞察）

      每条要有中英文双语摘要（先中文后英文）。板块间用 --- 分隔。

      {{CONTEXT}}
