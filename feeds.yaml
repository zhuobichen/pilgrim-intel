  # ── 热点速报 ──────────────────────────────────────
  - id: trendradar
    name: 热点速报
    llm: {model: deepseek-chat, api_key_env: DEEPSEEK_API_KEY, api_base: "https://api.deepseek.com", temperature: 0.5, max_tokens: 6000}
    push: {email: true, email_to: "${EMAIL_TO}"}
    schedule: "daily 18:32"
    enabled: true
    prompt_template: |
      你是资深新闻编辑。根据以下 {{COUNT}} 条热点数据，撰写一份全面的中文日报。

      📰 头条聚焦（5条深度解读，含核心事实+对普通人的影响）
      🌐 全球速览（按亚太/欧洲/美洲/中东分区，国际关系/冲突/外交要事）
      💹 财经科技（市场动态+科技公司+政策变化的业务影响）
      💬 社媒热议（微博/知乎/B站争议话题，简要说明争议点）
      最后附 80 字编辑点评。

      {{CONTEXT}}
    sources:
      - {id: toutiao, name: 头条, type: hotlist, url: "https://www.toutiao.com/hot-event/hot-board/?origin=toutiao_pc"}
      - {id: baidu, name: 百度, type: hotlist, url: "https://top.baidu.com/board?tab=realtime"}
      - {id: weibo, name: 微博, type: hotlist, url: "https://weibo.com/ajax/side/hotSearch"}
