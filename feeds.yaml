# Pilgrim Intel v2.1 — 60+ 信源 · 深度AI日报
feeds:

  # ── 综合日报 ──────────────────────────────────────
  - id: abstract-culture
    name: 综合日报
    llm: {model: deepseek-chat, api_key_env: DEEPSEEK_API_KEY, api_base: "https://api.deepseek.com", temperature: 0.85, max_tokens: 8000}
    push: {email: true, email_to: "${EMAIL_TO}"}
    schedule: "daily 18:30"
    enabled: true
    prompt_template: |
      你是资深新闻主编，根据以下 {{COUNT}} 条来自全球多平台的当日热点，制作一份全面深入的中文日报。每个板块至少写 300 字，要有实质内容而非简单罗列标题。

      🔥 今日焦点（5-8条深度解读，每条含核心事实+背景+各方影响）
      🌍 国际要闻（按亚太/欧洲/美洲/中东分区，政治/经济/外交要事）
      💻 科技前沿（AI进展、开源项目、公司动态、学术突破，要有技术解释）
      📊 趋势洞察（2-3个跨领域宏观趋势，分析驱动力和走向）
      🎭 文化观察（社交媒体热议、互联网亚文化现象）

      格式 Markdown，板块间用 --- 分隔。

      {{CONTEXT}}
    sources:
      - {id: weibo, name: 微博, type: hotlist, url: "https://weibo.com/ajax/side/hotSearch"}
      - {id: bilibili, name: B站, type: hotlist, url: "https://api.bilibili.com/x/web-interface/ranking/v2?rid=0"}
      - {id: zhihu, name: 知乎, type: hotlist, url: "https://www.zhihu.com/api/v3/feed/topstory/hot-lists/total?limit=20"}
      - {id: baidu, name: 百度, type: hotlist, url: "https://top.baidu.com/board?tab=realtime"}
      - {id: toutiao, name: 头条, type: hotlist, url: "https://www.toutiao.com/hot-event/hot-board/?origin=toutiao_pc"}
      - {id: 36kr, name: 36氪, type: hotlist, url: "https://36kr.com/api/newsflash"}
      - {id: ithome, name: IT之家, type: rss, url: "https://www.ithome.com/rss/"}
      - {id: hackernews, name: HN, type: hotlist, url: "https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=20"}
      - {id: npr, name: NPR, type: rss, url: "https://feeds.npr.org/1001/rss.xml"}
      - {id: france24, name: France24, type: rss, url: "https://www.france24.com/en/rss"}
      - {id: cbs, name: CBS, type: rss, url: "https://www.cbsnews.com/latest/rss/main"}
      - {id: abcnews, name: ABC, type: rss, url: "https://abcnews.go.com/abcnews/topstories"}
      - {id: politico, name: Politico, type: rss, url: "https://rss.politico.com/politics-news.xml"}
      - {id: cnbc, name: CNBC, type: rss, url: "https://www.cnbc.com/id/19854910/device/rss/rss.html"}
      - {id: techcrunch, name: TechCrunch, type: hotlist, url: "https://techcrunch.com/wp-json/wp/v2/posts?per_page=15&_fields=title,link"}
      - {id: theverge, name: TheVerge, type: rss, url: "https://www.theverge.com/rss/index.xml"}
      - {id: arstechnica, name: Ars, type: rss, url: "https://feeds.arstechnica.com/arstechnica/index"}
